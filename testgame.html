<script>
// 纯决策逻辑：无 DOM 依赖。构建时会被剥掉 `export` 内联进 HTML。
//
// 卡覆盖规则（来自真实 booking-probe 数据）：
//   开放 pass（residency 非 'yes'，即 no / unknown）：探测证明"同联盟非本镇的卡被接受"
//     → 持有【同联盟任一馆】的卡即可覆盖；且无居民限制。
//   仅限居民 pass（residency === 'yes'，scope=town）：探测证明"连同联盟的卡都被拦"
//     → 只认【发证馆本馆】的卡，且需本镇居民。

// 能用于这条 pass 的、用户持有的卡。heldCards: [{id, network, ...}]
function usableCardsForPass(pass, heldCards) {
  if (pass.residency !== 'yes') return heldCards.filter((c) => c.network === pass.network);
  return heldCards.filter((c) => c.id === pass.library_id);
}

// 单条 pass 的状态：
//   1 = 完全符合   2 = 缺卡   3 = 仅限居民（有卡但非居民）   4 = 都不符合
function passState(pass, heldCards, homeTown) {
  const usable = usableCardsForPass(pass, heldCards).length > 0;
  if (pass.residency !== 'yes') return usable ? 1 : 2; // 开放：无居民限制，只看卡
  const resident = homeTown === pass.library_town;
  if (usable && resident) return 1;
  if (!usable && resident) return 2;
  if (usable && !resident) return 3;
  return 4;
}

// 景点整体状态 = 名下所有 pass 里"最好"（最小）的那个；无 pass 返回 5。
// 排序语义：1(完全符合) < 2(缺卡) < 3(仅限居民) < 4(都不符合) < 5(无 pass)。
function bestState(states) {
  return states.reduce((min, s) => Math.min(min, s), 5);
}

</script>

const state = { homeTown: '', held: new Set(), cardNumbers: {} };
const $ = (sel) => document.querySelector(sel);

const networkBadge = (n) => `<span class="badge">${n}</span>`;
function residencyLabel(p) {
  if (p.residency === 'yes') return `<span class="res res-yes">仅限居民 · ${p.library_town}</span>`;
  return `<span class="res res-open">无限制</span>`;
}
const summaryText = (p) => (p.summary ? p.summary : '<em>无折扣信息</em>');

// 列表页状态文案：pill = 每条 pass 的简短状态；head = 景点整体(最佳)状态
const STATUS = {
  1: { cls: 's1', pill: '✓ 完全符合', head: '✅ 有完全符合的 Pass · 可直接预定' },
  2: { cls: 's2', pill: '缺卡', head: '⚠️ 最佳为「缺卡」· 需对应图书馆卡' },
  3: { cls: 's3', pill: '仅限居民', head: '⛔ 仅限居民' },
  4: { cls: 's4', pill: '都不符合', head: '⛔ 都不符合' },
  5: { cls: 's2', pill: '', head: '无可用 Pass' },
};

// 用户当前持有的卡（带 network），供 logic 计算覆盖
const heldCards = () => TESTGAME_DATA.libraries
  .filter((l) => state.held.has(l.id))
  .map((l) => ({ id: l.id, network: l.network, name: l.name, town: l.town }));

function renderControls() {
  const opts = ['<option value="">— 选择你的 Home Town —</option>']
    .concat(TESTGAME_DATA.towns.map((t) => `<option value="${t}">${t}</option>`)).join('');
  $('#town').innerHTML = opts;
  $('#town').value = state.homeTown;
  $('#libraries').innerHTML = TESTGAME_DATA.libraries.map((l) => `
    <label class="lib ${state.held.has(l.id) ? 'on' : ''}">
      <input type="checkbox" data-lib="${l.id}" ${state.held.has(l.id) ? 'checked' : ''}>
      <span>${l.name} ${networkBadge(l.network)}<br><small>${l.town}</small></span>
      <input type="text" class="cardnum" data-card="${l.id}" placeholder="卡号"
        value="${state.cardNumbers[l.id] || ''}" ${state.held.has(l.id) ? '' : 'disabled'}>
    </label>`).join('');
}

function renderAttractions() {
  const cards = heldCards();
  const list = TESTGAME_DATA.attractions.map((a) => {
    const rows = TESTGAME_DATA.passes
      .filter((p) => p.attraction_slug === a.slug)
      .map((p) => ({ p, s: passState(p, cards, state.homeTown) }))
      .sort((x, y) => x.s - y.s);
    return { a, rows, best: bestState(rows.map((r) => r.s)) };
  }).sort((x, y) => x.best - y.best);

  $('#attractions').innerHTML = list.map(({ a, rows, best }) => {
    const head = STATUS[best];
    const body = rows.map(({ p, s }) => {
      const st = STATUS[s];
      return `
        <div class="passrow ${st.cls}">
          <span class="sum">${summaryText(p)}</span>
          <span class="lib2">${p.library_name} ${networkBadge(p.network)}</span>
          ${residencyLabel(p)}
          <span class="pstatus ${st.cls}">${st.pill}</span>
          <button class="book" data-slug="${a.slug}" data-libid="${p.library_id}">Book</button>
        </div>`;
    }).join('') || '<div class="passrow"><em>样本馆均不提供此景点 pass</em></div>';
    const price = a.price_adult != null ? `成人 $${a.price_adult}` : '价格未知';
    return `
      <div class="card">
        <span class="cardstatus ${head.cls}">${head.head}</span>
        <div class="card-head">
          <h3>${a.name}</h3>
          <a href="${a.website || '#'}" target="_blank" rel="noopener">官网 ↗</a>
          <span class="price">${price}</span>
        </div>
        <div class="passes">${body}</div>
      </div>`;
  }).join('');
}

function render() { renderControls(); renderAttractions(); }

document.addEventListener('change', (e) => {
  if (e.target.matches('#town')) { state.homeTown = e.target.value; render(); }
  else if (e.target.matches('[data-lib]')) {
    const id = e.target.dataset.lib;
    if (e.target.checked) state.held.add(id); else state.held.delete(id);
    render();
  }
});
document.addEventListener('input', (e) => {
  if (e.target.matches('[data-card]')) state.cardNumbers[e.target.dataset.card] = e.target.value;
});
document.addEventListener('click', (e) => {
  if (e.target.matches('.book')) openModal(e.target.dataset.slug, e.target.dataset.libid);
  else if (e.target.matches('.modal-close') || e.target.matches('#modal')) closeModal();
  else if (e.target.matches('[data-copy]')) {
    const v = e.target.dataset.copy;
    if (v && navigator.clipboard) navigator.clipboard.writeText(v);
    e.target.textContent = '已复制';
  }
});

const go = (url) => window.open(url || '#', '_blank', 'noopener');

function openModal(slug, libId) {
  const a = TESTGAME_DATA.attractions.find((x) => x.slug === slug);
  const p = TESTGAME_DATA.passes.find((x) => x.attraction_slug === slug && x.library_id === libId);
  const cards = heldCards();
  const s = passState(p, cards, state.homeTown);
  const usable = usableCardsForPass(p, cards);
  const url = a.booking_url || a.website || '#';
  const open = p.residency !== 'yes';

  let notes = '';
  if (s === 1) notes += `<p class="note ok">✅ 你持有可用卡${open ? '' : ' 且符合居民要求'}，可直接预定。</p>`;
  if (s === 2) notes += open
    ? `<p class="note warn">⚠ 需要图书馆卡：持有 ${p.network} 联盟任一馆的卡即可（你当前没有）。</p>`
    : `<p class="note warn">⚠ 需要图书馆卡：此 Pass 只认 ${p.library_name} 本馆的卡（同联盟别的卡无效）。</p>`;
  if (s === 3) notes += `<p class="note block">⛔ 仅限居民：此 Pass 仅限 ${p.library_town} 的居民。如果你其实是当地居民，可忽略并继续。</p>`;
  if (s === 4) {
    notes += `<p class="note warn">⚠ 需要图书馆卡：只认 ${p.library_name} 本馆的卡。</p>`;
    notes += `<p class="note block">⛔ 仅限居民：仅限 ${p.library_town} 的居民。</p>`;
  }

  let cardHtml = '';
  if (usable.length) {
    cardHtml = '<h4>你持有的可用卡</h4>' + usable.map((c) => {
      const num = state.cardNumbers[c.id] || '';
      return `<div class="cardline"><span>${c.name} ${networkBadge(c.network)}</span>
        <code>${num || '未录入卡号'}</code>
        <button data-copy="${num}" ${num ? '' : 'disabled'}>Copy</button></div>`;
    }).join('');
  } else if (open) {
    const sug = TESTGAME_DATA.libraries.filter((l) => l.network === p.network);
    cardHtml = `<h4>需要 ${p.network} 联盟任一馆的卡</h4>` + sug.map((l) =>
      `<div class="cardline"><span>${l.name} <small>${l.town}</small></span></div>`).join('');
  } else {
    cardHtml = `<h4>需要这张卡</h4><div class="cardline"><span>${p.library_name} ${networkBadge(p.network)} <small>${p.library_town}</small></span></div>`;
  }

  const single = usable.length === 1 ? usable[0] : null;
  const singleNum = single ? (state.cardNumbers[single.id] || '') : '';
  const actions = (single && singleNum)
    ? '<button class="primary" id="copygo">Copy and Go</button>'
    : `<button class="primary" id="goonly">${s === 1 ? 'Go' : 'Go anyway'}</button>`;

  $('#modal-title').textContent = `${a.name} · ${p.library_name}`;
  $('#modal-body').innerHTML = notes + cardHtml;
  $('#modal-actions').innerHTML = actions;
  if ($('#copygo')) $('#copygo').onclick = () => { if (navigator.clipboard) navigator.clipboard.writeText(singleNum); go(url); };
  if ($('#goonly')) $('#goonly').onclick = () => go(url);
  $('#modal').classList.remove('hidden');
}
function closeModal() { $('#modal').classList.add('hidden'); }

render();
</script>
