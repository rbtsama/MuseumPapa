<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8">
<title>MuseumPapa · Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/panel.css">
</head><body>

<header class="topbar">
  <div class="brand"><span class="font-serif">MuseumPapa</span> · Admin Panel</div>
  <div class="stat" id="stat-summary">loading…</div>
</header>

<aside class="controls">
  <section class="ctrl-block">
    <h3>持卡情况 <span class="badge" id="lib-count">0 / 0</span></h3>
    <div class="ctrl-row">
      <button class="btn-tiny" id="btn-all">全选</button>
      <button class="btn-tiny" id="btn-none">清空</button>
    </div>
    <div class="hint" style="margin-bottom:6px">每个联盟选一张卡，即可使用该联盟所有图书馆的 pass。</div>
    <div class="lib-list" id="lib-list"></div>
  </section>

  <section class="ctrl-block">
    <h3>Home ZIP</h3>
    <div class="ctrl-row">
      <input type="text" id="home-zip" value="01880" maxlength="5" required>
      <button class="btn-tiny primary" id="btn-geocode">应用</button>
    </div>
    <div class="hint" id="zip-hint">5 位 ZIP（必填）。驱动居住资格 + 距离显示。</div>
  </section>

  <section class="ctrl-block">
    <h3>访问日期</h3>
    <div class="ctrl-row">
      <input type="date" id="visit-date">
    </div>
    <div class="hint">驱动 L8 限制检查 + L10 当日库存。</div>
  </section>

  <section class="ctrl-block">
    <h3>筛选</h3>
    <label class="ctrl-check"><input type="checkbox" id="opt-only-covered" checked> 隐藏无覆盖行</label>
    <label class="ctrl-line">分类
      <select id="opt-category">
        <option value="">(全部)</option>
      </select>
    </label>
  </section>
</aside>

<main class="matrix-wrap">
  <!-- ── 漏斗模拟器 ── -->
  <div class="sim-bar" id="sim-bar">
    <div class="sim-header" id="sim-toggle" role="button" aria-expanded="false" tabindex="0">
      <span class="sim-title">🔍 漏斗模拟器</span>
      <span class="sim-subtitle" id="sim-subtitle">选择景点，逐层验证每张 pass 的可用性</span>
      <span class="sim-chevron" id="sim-chevron">▶</span>
    </div>
    <div class="sim-body" id="sim-body" hidden>
      <div class="sim-inputs">
        <label class="sim-field">
          <span class="sim-label">景点</span>
          <select id="sim-attr" class="sim-select"></select>
        </label>
        <label class="sim-field">
          <span class="sim-label">Home ZIP</span>
          <input type="text" id="sim-zip" class="sim-input-sm" maxlength="5" value="01880">
        </label>
        <label class="sim-field">
          <span class="sim-label">日期</span>
          <input type="date" id="sim-date" class="sim-input-sm">
        </label>
        <label class="sim-field sim-field-wide">
          <span class="sim-label">持卡（图书馆 ID，逗号分隔；留空=跟随侧栏）</span>
          <input type="text" id="sim-cards" class="sim-input-wide" placeholder="例：wakefield,reading,bpl">
        </label>
        <button class="btn-tiny primary" id="sim-run">运行模拟 ▶</button>
      </div>
      <div id="sim-results" class="sim-results"></div>
    </div>
  </div>

  <div class="lens-bar">
    <button class="lens-btn active" data-lens="A">A · 卡覆盖查询</button>
    <button class="lens-btn" data-lens="B">B · 资格政策审查</button>
    <button class="lens-btn" data-lens="C">C · 优惠细节准确性</button>
    <button class="lens-btn" data-lens="D">D · 分馆与景点预约</button>
  </div>
  <div class="lens-content" id="lens-content">
    <div class="loading-msg">正在加载数据…</div>
  </div>
</main>

<script src="assets/panel.js"></script>
</body></html>
