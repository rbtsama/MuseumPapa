<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8">
<title>MuseumPapa · Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/panel.css">
</head><body>

<header class="topbar">
  <div class="brand"><span class="font-serif">MuseumPapa</span> · Admin Panel</div>
  <div class="stat" id="stat-summary">loading…</div>
</header>

<aside class="controls">
  <section class="ctrl-block">
    <h3>Cards <span class="badge" id="lib-count">0 / 0</span></h3>
    <div class="ctrl-row">
      <button class="btn-tiny" id="btn-all">All</button>
      <button class="btn-tiny" id="btn-none">None</button>
    </div>
    <input type="search" id="lib-filter" placeholder="filter…">
    <div class="lib-list" id="lib-list"></div>
  </section>

  <section class="ctrl-block">
    <h3>Home ZIP</h3>
    <div class="ctrl-row">
      <input type="text" id="home-zip" value="01880" maxlength="5" required>
      <button class="btn-tiny primary" id="btn-geocode">Apply</button>
    </div>
    <div class="hint" id="zip-hint">5-digit ZIP (required). Drives attraction + pickup distances.</div>
  </section>

  <section class="ctrl-block">
    <h3>View</h3>
    <label class="ctrl-check"><input type="checkbox" id="opt-only-covered" checked> Hide rows with no coverage</label>
    <label class="ctrl-line">Sort attractions
      <select id="opt-sort">
        <option value="coverage-desc">Coverage (most cards first)</option>
        <option value="name-asc">Name A → Z</option>
        <option value="best-strength">Best deal strength</option>
        <option value="price-desc">Original price ↓</option>
        <option value="distance-asc">Distance from ZIP ↑</option>
      </select>
    </label>
    <label class="ctrl-line">Category
      <select id="opt-category">
        <option value="">(all)</option>
      </select>
    </label>
  </section>
</aside>

<main class="matrix-wrap">
  <table class="matrix" id="matrix">
    <thead><tr id="matrix-head"></tr></thead>
    <tbody id="matrix-body"></tbody>
  </table>
</main>

<script src="assets/panel.js"></script>
</body></html>
